<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60"
     viewBox="0 0 800 60" role="img" aria-label="Tech stack marquee">
  <defs>
    <linearGradient id="mqBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#151c25"/>
    </linearGradient>
    <clipPath id="mqClip">
      <rect width="800" height="60" rx="10"/>
    </clipPath>
    <style>
      @keyframes mqScroll {
        0%   { transform: translateX(0px); }
        100% { transform: translateX(-835px); }
      }
      .mq-track {
        animation: mqScroll 30s linear infinite;
        will-change: transform;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="60" rx="10" fill="url(#mqBg)"/>
  <rect width="800" height="60" rx="10" fill="none"
        stroke="#2b303a" stroke-width="1" opacity="0.5"/>


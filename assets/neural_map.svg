<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">\n  <style>\n    .tech { font-family: Consolas, monospace; font-size: 11px; fill: #eceff4; transition: all 0.3s; }\n    .node-core { fill: #b6a891; }\n    .node-ring { fill: none; stroke: #2b303a; stroke-width: 1; }\n    .edge { fill: none; stroke: #2b303a; stroke-width: 1.2; opacity: 0.5; }\n  </style>\n  <rect width="800" height="280" fill="#0b0f14" rx="12"/>\n  <g class="node-group">\n    <circle cx="100" cy="60" r="14" class="node-ring"/>\n    <circle cx="100" cy="60" r="3" class="node-core"/>\n    <text x="100" y="40" text-anchor="middle" class="tech">React</text>\n  </g>\n  <g class="node-group">\n    <circle cx="100" cy="120" r="14" class="node-ring"/>\n    <circle cx="100" cy="120" r="3" class="node-core"/>\n    <text x="100" y="100" text-anchor="middle" class="tech">Next.js</text>\n  </g>\n  <g class="node-group">\n    <circle cx="300" cy="60" r="14" class="node-ring"/>\n    <circle cx="300" cy="60" r="3" class="node-core"/>\n    <text x="300" y="40" text-anchor="middle" class="tech">FastAPI</text>\n  </g>\n  <g class="node-group">\n    <circle cx="300" cy="120" r="14" class="node-ring"/>\n    <circle cx="300" cy="120" r="3" class="node-core"/>\n    <text x="300" y="100" text-anchor="middle" class="tech">Go</text>\n  </g>\n  <g class="node-group">\n    <circle cx="500" cy="60" r="14" class="node-ring"/>\n    <circle cx="500" cy="60" r="3" class="node-core"/>\n    <text x="500" y="40" text-anchor="middle" class="tech">Docker</text>\n  </g>\n  <g class="node-group">\n    <circle cx="500" cy="120" r="14" class="node-ring"/>\n    <circle cx="500" cy="120" r="3" class="node-core"/>\n    <text x="500" y="100" text-anchor="middle" class="tech">K8s</text>\n  </g>\n  <path d="M100 120 C150 120, 250 120, 300 120" class="edge"/>\n  <circle r="2" fill="#eceff4" opacity="0.8">\n    <animateMotion dur="3s" repeatCount="indefinite" path="M100 120 C150 120, 250 120, 300 120"/>\n  </circle>\n  <path d="M300 120 C350 120, 450 120, 500 120" class="edge"/>\n  <circle r="2" fill="#eceff4" opacity="0.8">\n    <animateMotion dur="3s" repeatCount="indefinite" path="M300 120 C350 120, 450 120, 500 120"/>\n  </circle>\n</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#151c25"/>
    </linearGradient>
    <style>
    
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .title    { opacity: 0; animation: fadein 0.8s 0.1s ease forwards; }
    .subtitle { opacity: 0; animation: fadein 0.8s 0.6s ease forwards; }
    
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" fill="url(#bg-grad)" rx="10" ry="10"/>

  <!-- Accent underline for title -->
  <rect x="340" y="90" width="120" height="3" fill="#b6a891" rx="2"
        opacity="0" style="animation: fadein 0.6s 1.0s ease forwards;"/>

  <!-- Title -->
  <text x="400" y="72" text-anchor="middle" dominant-baseline="middle"
        fill="#eceff4" font-family=""Segoe UI", Inter, sans-serif, sans-serif"
        font-size="36" font-weight="bold" class="title">Nipun Nirwana</text>

  <!-- Subtitle -->
  <text x="400" y="118" text-anchor="middle" dominant-baseline="middle"
        fill="#b6a891" font-family="Consolas, monospace, monospace"
        font-size="16" class="subtitle">Building things that matter</text>
</svg>